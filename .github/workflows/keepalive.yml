name: keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health with 120s timeout
        run: |
          curl -sS --max-time 120 -o /dev/null -w "HTTP %{http_code} time_total=%{time_total}s\n" \
            https://samolet-parking-bot.onrender.com/health
